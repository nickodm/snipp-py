[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "snipp"
dynamic = ["version"]
authors = [{name = "Nicolás Miranda"}]
description = "CLI tool to manage snippets."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]

requires-python = ">=3.10"
dependencies = [
    "rich>=15.0.0",
    "tomlkit>=0.14.0",
    "pathvalidate>=3.3.1",
    "platformdirs>=4.9.6"
]

[project.urls]
Repository = "https://github.com/nickodm/snipp-py"

[project.scripts]
snipp = "snipp.main:run"

[tool.hatch.version]
path = "src/snipp/__init__.py"